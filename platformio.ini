[env:m5stick-c-plus2]
platform = espressif32@6.8.1
board = m5stick-c ;m5stick-c-plus2
framework = arduino

monitor_speed = 115200

lib_deps =

  ; ------------------------------------------------------------------------------------
  ; M5Stack
  ; ------------------------------------------------------------------------------------

  ; https://github.com/m5stack/M5GFX
  ; https://github.com/m5stack/M5Unit
  ; https://github.com/m5stack/M5UnitUnified
  M5GFX=m5stack/M5GFX
  M5Unified=m5stack/M5Unified
  M5UnitUnified=m5stack/M5UnitUnified

  ; https://github.com/m5stack/M5Unit-DISTANCE
  ; SKU:U098-B1 = UNIT SONIC I2C
  M5UnitUnifiedDISTANCE=m5stack/M5Unit-DISTANCE  
  
  ; https://github.com/m5stack/M5Unit-WEIGHT
  ; SKU:U180 = Weight I2C Unit 
  ; https://docs.m5stack.com/en/unit/Unit-Weight%20I2C
  M5UnitUnifiedWEIGHT=m5stack/M5Unit-WEIGHT
  ;https://github.com/m5stack/M5Unit-Miniscale ;m5stack/M5Unit-Miniscale
  
  ; https://github.com/m5stack/M5Unit-HUB
  ; SKU:U040-B-V21 = Unit PaHub v2.1 I2C multiplexer
  M5UnitUnifiedHUB=m5stack/M5Unit-HUB
  
  M5Unit-NB-IoT2=https://github.com/m5stack/TinyGSM 
  ;m5stack/M5Unit-NB-IoT2
  ;TinyGSM-patch=https://github.com/m5stack/TinyGSM/archive/refs/tags/v0.12.0-patch-1.zip
  
  ; ------------------------------------------------------------------------------------
  ; Adafruit
  ; ------------------------------------------------------------------------------------
  
  Adafruit-MPU6050=adafruit/Adafruit MPU6050
  Adafruit-Unified-Sensor=adafruit/Adafruit Unified Sensor

  ; ------------------------------------------------------------------------------------
  ; h2zero
  ; ------------------------------------------------------------------------------------
  
  ; https://github.com/h2zero/NimBLE-Arduino
  NimBLE-Arduino=h2zero/NimBLE-Arduino 
  
  ; ------------------------------------------------------------------------------------
  ; bblanchon
  ; ------------------------------------------------------------------------------------
  
  ArduinoJson=bblanchon/ArduinoJson
  
  ; ------------------------------------------------------------------------------------
  ; Meshtastic
  ; ------------------------------------------------------------------------------------
  
  ; https://github.com/meshtastic/Meshtastic-arduino
  ;
  Meshtastic=https://github.com/meshtastic/Meshtastic-arduino 
  ;meshtastic/Meshtastic @ ^2.3.0
  
  ; ------------------------------------------------------------------------------------
  ; esp32async
  ; ------------------------------------------------------------------------------------
  
  ESPAsyncWebServer=esp32async/ESPAsyncWebServer
  AsyncTCP=esp32async/AsyncTCP
  ;ESPAsyncDNSServer=esphome/ESPAsyncDNSServer

  ; ------------------------------------------------------------------------------------
  ; ayushsharma82
  ; ------------------------------------------------------------------------------------
  
  AsyncElegantOTA=ayushsharma82/ElegantOTA ;ayushsharma82/AsyncElegantOTA
  
  ; ------------------------------------------------------------------------------------
  ; MQTT
  ; ------------------------------------------------------------------------------------
  
  uMQTTBroker=uMQTTBroker
  PubSubClient=knolleary/PubSubClient
  
lib_ignore =
  ESP32 BLE Arduino
  NimBLE

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINOJSON_ENABLE_STD_STRING
  -D CONFIG_BT_NIMBLE_ENABLED

;board_build.variant = variants/m5stick_c_plus2
board_build.filesystem = spiffs

custom_description     = SmartFranklin
custom_hardware        = M5Stick C plus 2

